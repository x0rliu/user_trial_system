<!--app/templates/surveys/bonus_summary.html-->

<div class="summary-panel">

    <h3>Survey Summary</h3>

    <div class="summary-group">
        <div class="summary-label">Survey name</div>
        <div class="summary-value">__SURVEY_NAME__</div>
    </div>

    <div class="summary-group">
        <div class="summary-label">Dates</div>
        <div class="summary-value">__START_DATE__ → __END_DATE__</div>
    </div>

    <div class="summary-group">
        <div class="summary-label">Purpose</div>
        <div class="summary-value muted">
            __PURPOSE__
        </div>
    </div>

    <div class="summary-divider"></div>

    <div class="summary-group">
        <div class="summary-label">Survey link</div>
        <div class="summary-value monospace">
            __SURVEY_URL__
        </div>
    </div>

    <div class="summary-divider"></div>

    <div class="summary-group">
        <div class="summary-label">Target audience</div>
        <div class="summary-value">
            __TARGETING_SUMMARY__
        </div>
    </div>

</div>
