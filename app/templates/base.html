<script>
document.addEventListener("click", (e) => {
    // 🔒 Ignore overlay interactions entirely
    if (e.target.closest("#interest-overlay")) {
        return;
    }

    // 🔒 Ignore interest triggers
    //  if (e.target.closest(".product-type-trigger")) {
    //    return;
    //}

    const trigger = e.target.closest(".dropdown-trigger");
    const allDropdowns = document.querySelectorAll(".dropdown");

    if (trigger) {
        e.preventDefault();
        const dropdown = trigger.closest(".dropdown");

        allDropdowns.forEach(d => {
            if (d !== dropdown) d.classList.remove("open");
        });

        dropdown.classList.toggle("open");

        if (trigger.classList.contains("notification-bell")) {
            fetch("/notifications/mark-read");

            const badge = trigger.querySelector(".notification-badge");
            if (badge) badge.remove();
        }

        return;
    }

    // Click outside → close all dropdowns
    allDropdowns.forEach(d => d.classList.remove("open"));
});


// Escape key closes all dropdowns
document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
        document.querySelectorAll(".dropdown")
            .forEach(d => d.classList.remove("open"));
    }
});
</script>

<script>
function toggleShipping(id, btnId) {
    const el = document.getElementById(id);
    const btn = document.getElementById(btnId);

    if (!el || !btn) return;

    const isHidden = el.style.display === "none";

    el.style.display = isHidden ? "table-row" : "none";

    // Toggle button text
    btn.textContent = isHidden ? "Hide" : "Edit";
}
</script>
<script>
function toggleSwot(id) {
    var el = document.getElementById(id);
    if (!el) return;

    if (el.style.display === "none") {
        el.style.display = "block";
    } else {
        el.style.display = "none";
    }
}
</script>
