<section class="auth-page-shell nda-onboarding-page">

    <div class="auth-card nda-card">

        <header class="auth-header nda-header">
            <h1 class="auth-title">Non-Disclosure Agreement</h1>
            <p class="auth-subtitle">
                Please review and accept the Global Non-Disclosure Agreement before continuing.
                This agreement applies to Logitech User Trial confidential materials.
            </p>
        </header>

        <div class="nda-document-panel" aria-label="Global Non-Disclosure Agreement">
            __NDA_CONTENT__
        </div>

        <form method="POST" action="/nda" class="nda-form">
            <input type="hidden" name="csrf_token" value="__CSRF_TOKEN__">

            <label class="nda-ack-panel">
                <input type="checkbox" name="agree" required>
                <span>
                    I, <strong>__FULL_NAME__</strong>, acknowledge that I have read and agree to the
                    Global Non-Disclosure Agreement.
                </span>
            </label>

            <p class="auth-help nda-note">
                A copy of this agreement will be available in your profile.
            </p>

            <!-- label class="nda-email-option">
                <input type="checkbox" name="email_copy">
                Email me a copy of this agreement
            </label -->

            <div class="auth-actions nda-actions">
                <button type="submit" class="auth-primary-button">
                    Submit and Continue
                </button>
            </div>
        </form>

    </div>

</section>
