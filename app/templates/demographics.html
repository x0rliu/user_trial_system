<div class="auth-main">
  <div class="auth-form">
    <h1>Basic Demographic Information</h1>
    <p>Please complete the required fields before signing the NDA.</p>

    __ERROR_BLOCK__

    <form method="POST" action="/demographics">
      <label for="first_name">First name</label>
      <input id="first_name" name="first_name" required />

      <label for="last_name">Last name</label>
      <input id="last_name" name="last_name" required />

      <label for="email">Email address</label>
      <input id="email" name="email" type="email" disabled value="__EMAIL__" />

      <label for="gender">
        Gender
        <span class="tooltip"
              data-tooltip="We track gender to help ensure fair representation across different participants in our research studies. You may select Prefer not to say.">ⓘ</span>
      </label>
      <select id="gender" name="gender" required>
        <option value="">Select</option>
        <option value="female">Female</option>
        <option value="male">Male</option>
        <option value="non_binary">Non-binary</option>
        <option value="prefer_not_to_say">Prefer not to say</option>
      </select>

      <label for="birth_year">
        Birth year
        <span class="tooltip"
              data-tooltip="Birth year is required to confirm you are eligible to participate and sign NDAs.">ⓘ</span>
      </label>
      <input id="birth_year" name="birth_year" type="number" min="1900" max="2025" required />

      <label for="country">
        Country
        <span class="tooltip"
              data-tooltip="Country is required because trial eligibility often depends on region.">ⓘ</span>
      </label>
      <select id="country" name="country" required>
        <option value="">Select country</option>
        __COUNTRY_OPTIONS__
      </select>

      <label for="city">
        City
        <span class="tooltip"
              data-tooltip="City is optional. It may help with logistics later, but it is not required for onboarding.">ⓘ</span>
      </label>
      <input id="city" name="city" />

      <label for="mobile_country_code">
        Mobile country code
        <span class="tooltip"
              data-tooltip="Optional. If selected for a trial, you may be asked for contact details during logistics.">ⓘ</span>
      </label>
      <input id="mobile_country_code" name="mobile_country_code" placeholder="+886" />

      <label for="mobile_national">
        Mobile number
        <span class="tooltip"
              data-tooltip="Optional. If you enter a mobile number, include both the country code and phone number.">ⓘ</span>
      </label>
      <input id="mobile_national" name="mobile_national" placeholder="912345678" />

      <button type="submit">Continue</button>
    </form>
  </div>
</div>
