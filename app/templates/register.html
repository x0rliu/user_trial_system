<!--app/templates/register.html-->

<section class="auth-page-shell">

    <div class="auth-card">

        <header class="auth-header">
            <p class="auth-eyebrow">User Trial Program</p>
            <h1 class="auth-title">Create an Account</h1>
            <p class="auth-subtitle">
                Register for access to Logitech user trials and profile matching.
            </p>
        </header>

        __ERROR_BLOCK__

        <form method="POST" action="/register" class="auth-form" novalidate>

            <div class="auth-field-grid">

                <div class="auth-field">
                    <label for="email">Email</label>
                    <input
                        id="email"
                        name="email"
                        type="email"
                        autocomplete="email"
                        required
                        autofocus
                    >
                </div>

                <div class="auth-field">
                    <label for="confirm_email">Confirm email</label>
                    <input
                        id="confirm_email"
                        name="confirm_email"
                        type="email"
                        autocomplete="email"
                        required
                    >
                </div>

            </div>

            <div class="auth-field-grid">

                <div class="auth-field">
                    <label for="password">Password</label>
                    <input
                        id="password"
                        name="password"
                        type="password"
                        autocomplete="new-password"
                        required
                    >
                    <div class="auth-help">
                        Must be at least 12 characters.
                    </div>
                </div>

                <div class="auth-field">
                    <label for="confirm_password">Confirm password</label>
                    <input
                        id="confirm_password"
                        name="confirm_password"
                        type="password"
                        autocomplete="new-password"
                        required
                    >
                </div>

            </div>

            <div class="auth-actions">
                <button type="submit" class="auth-primary-button">
                    Create Account
                </button>
            </div>

        </form>

        <footer class="auth-footer">
            Already have an account?
            <a href="/login">Log in</a>
        </footer>

    </div>

</section>
