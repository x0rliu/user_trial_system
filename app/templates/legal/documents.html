<!--app/templates/legal/documents.html-->

<div class="legal-layout">

    <!-- =========================
         Left Rail
         ========================= -->
    <aside class="legal-rail">

        <div class="legal-rail-heading">
            <div class="legal-rail-eyebrow">Workspace</div>
            <h2>Legal Documents</h2>
        </div>

        <section class="legal-rail-group">
            <div class="rail-header">Active</div>
            <div class="rail-section">
                __ACTIVE_DOCS__
            </div>
        </section>

        <section class="legal-rail-group">
            <div class="rail-header">Drafts</div>
            <div class="rail-section">
                __DRAFT_DOCS__
            </div>
        </section>

        <section class="legal-rail-group">
            <details class="legal-archive-group">
                <summary class="rail-header">Archived</summary>
                <div class="rail-section archived">
                    __ARCHIVED_DOCS__
                </div>
            </details>
        </section>

    </aside>

    <!-- =========================
         Editor Column
         ========================= -->
    <main class="legal-editor" data-document-id="__DOC_ID__">

        <header class="legal-editor-header">
            <div>
                <p class="legal-editor-eyebrow">Legal document editor</p>
                <h1 class="legal-editor-title">__DOC_TITLE__</h1>

                <div class="legal-document-meta">
                    <span class="legal-meta-pill">Type: __DOC_TYPE__</span>
                    <span class="legal-meta-pill">Version: v__VERSION__</span>
                    <span class="legal-meta-pill status __DOC_STATUS_CLASS__">__DOC_STATUS__</span>
                </div>
            </div>
        </header>

        <form class="legal-document-form"
              action="javascript:void(0)"
              method="post"
              data-endpoint="/legal/documents/save">

            <input type="hidden" name="document_id" value="__DOC_ID__">
            <input type="hidden" name="document_type" value="__DOC_TYPE__">
            <input type="hidden" name="version" value="__VERSION__">

            <section class="legal-editor-card">
                <textarea id="legal-editor" name="content">__EDITOR_CONTENT__</textarea>
            </section>

            __LEGAL_ACTIONS__

        </form>

    </main>

</div>

<!-- =========================
     TinyMCE
     ========================= -->
<script
    src="/static/vendor/tinymce/tinymce.min.js"
    referrerpolicy="origin"
    crossorigin="anonymous">
</script>

<script>
tinymce.init({
    selector: '#legal-editor',

    // HARD ASSERT: self-hosted community mode
    base_url: '/static/vendor/tinymce',
    suffix: '.min',

    menubar: false,
    statusbar: false,
    height: 620,
    branding: false,

    // Community plugins ONLY
    plugins: 'lists link',

    // NO styles / format dropdown
    toolbar:
        'undo redo | bold italic underline | bullist numlist | link | removeformat',

    content_style:
        'body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 15px; line-height: 1.65; color: #111827; padding: 18px 22px; } h1, h2, h3 { line-height: 1.3; }'
});
</script>
