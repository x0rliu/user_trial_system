<!-- app/templates/legal/audit.html -->

<div class="legal-layout legal-audit-layout-page">
    __AUDIT_SIDE_RAIL__

    <main class="legal-editor legal-audit-main">
        <header class="legal-editor-header legal-audit-header">
            <div>
                <h1 class="legal-editor-title">Legal Document Audit</h1>
                <p class="legal-audit-intro">
                    Review the DB-backed historical record for legal document versions and lineage.
                </p>
            </div>

            <div class="legal-audit-summary">
                <div>
                    <span class="legal-audit-summary-value">__AUDIT_DOCUMENT_COUNT__</span>
                    <span class="legal-audit-summary-label">Document families</span>
                </div>
                <div>
                    <span class="legal-audit-summary-value">__AUDIT_REVISION_COUNT__</span>
                    <span class="legal-audit-summary-label">Total versions</span>
                </div>
                <div>
                    <span class="legal-audit-summary-value">__AUDIT_EVENT_COUNT__</span>
                    <span class="legal-audit-summary-label">Shown events</span>
                </div>
            </div>
        </header>

        <section class="legal-audit-content">
            __AUDIT_GROUPS__
        </section>
    </main>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    document.querySelectorAll(".legal-audit-version-row").forEach(function (row) {
        row.addEventListener("click", function (event) {
            if (event.target.closest("a")) {
                return;
            }

            const targetId = row.getAttribute("data-audit-target");
            const eventsRow = document.getElementById(targetId);
            const toggle = row.querySelector(".legal-audit-row-toggle");

            if (!eventsRow || !toggle) {
                return;
            }

            const shouldOpen = eventsRow.hidden;
            eventsRow.hidden = !shouldOpen;
            row.classList.toggle("is-expanded", shouldOpen);
            toggle.setAttribute("aria-expanded", shouldOpen ? "true" : "false");
        });
    });
});
</script>
